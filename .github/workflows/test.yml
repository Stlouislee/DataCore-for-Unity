name: Run Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DataCore.Tests~/DataCore.Tests.csproj

      - name: Build
        run: dotnet build DataCore.Tests~/DataCore.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test DataCore.Tests~/DataCore.Tests.csproj --no-build --configuration Release --verbosity normal
